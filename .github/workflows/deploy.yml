name: Deploy File Converter

on:

  push:
    branches: ['main']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  FRONTEND_IMAGE_NAME: file-converter/web
  BACKEND_IMAGE_NAME: file-converter/api

jobs:

  build:

    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps: 

      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Generate simple version based on date and build number
      - name: Generate version
        id: version
        run: |
          # Format: 2024.02.02-15 (date + build number)
          echo "VERSION=$(date +'%Y.%m.%d')-${{ github.run_number }}" >> $GITHUB_OUTPUT

      # 3. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Log in to Docker Registry
      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # 5. Build and push backend Docker image
      - name: Build and push file-converter/api (backend) image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.REGISTRY_HOST }}/${{ env.BACKEND_IMAGE_NAME }}:latest
            ${{ secrets.REGISTRY_HOST }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}

      # 6. Build and push frontend Docker image
      - name: Build and push file-converter/web (frontend) image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.REGISTRY_HOST }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
            ${{ secrets.REGISTRY_HOST }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
