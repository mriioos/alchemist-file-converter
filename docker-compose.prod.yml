services:

  # ── nginx — the ONLY service exposed to the host ──────────────────────────
  # Serves Astro static files, proxies /api/ → backend, handles auth via authelia.
  nginx:
    container_name: 'file-converter-nginx'
    image: nginx:alpine
    volumes:
      - ${FRONTEND_VOLUME}/dist:/usr/share/nginx/html:ro
      - ${NGINX_VOLUME}/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
      authelia:
        condition: service_healthy
    networks:
      - frontend_net  # nginx ↔ authelia
      - backend_net   # nginx ↔ backend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── FastAPI backend — internal only ───────────────────────────────────────
  # Reachable only from nginx via backend_net. Cannot reach authelia.
  backend:
    container_name: 'file-converter-backend'
    image: ${DOCKER_REGISTRY}/file-converter/api:latest
    expose:
      - "8000"
    volumes:
      - ${BACKEND_VOLUME}/conversions:/data/conversions
    env_file:
      - .env.config.prod
      - path: .env.credentials
        required: false
    networks:
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Cloudflare Tunnel — connects this stack to the internet via HTTPS ────
  # Requires a tunnel token from Cloudflare Zero Trust dashboard.
  # The tunnel routes external HTTPS traffic to nginx:80 over the Docker network.
  cloudflared:
    container_name: 'file-converter-cloudflared'
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      nginx:
        condition: service_started
    networks:
      - frontend_net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Authelia — internal only ───────────────────────────────────────────────
  # Reachable only from nginx via frontend_net. Cannot reach backend.
  authelia:
    container_name: 'file-converter-authelia'
    image: authelia/authelia:4.38
    expose:
      - "9091"
    environment:
      X_AUTHELIA_CONFIG_FILTERS: template
      DOMAIN: ${DOMAIN}
      PUBLIC_SCHEME: ${PUBLIC_SCHEME:-https}
      AUTHELIA_SESSION_SECRET: ${AUTHELIA_SESSION_SECRET}
      AUTHELIA_STORAGE_ENCRYPTION_KEY: ${AUTHELIA_STORAGE_ENCRYPTION_KEY}
    volumes:
      - ${AUTHELIA_VOLUME}/config:/config
      - ${AUTHELIA_VOLUME}/data:/data
    networks:
      - frontend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9091/authelia/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Networks ──────────────────────────────────────────────────────────────────
# Two isolated networks enforce the security boundary:
#   frontend_net  nginx ↔ authelia   (auth checks travel here)
#   backend_net   nginx ↔ backend    (API traffic travels here)
# authelia and backend are on separate networks and cannot communicate directly.
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge